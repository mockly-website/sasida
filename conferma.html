<!-- SA SIDA BY MOCKLYY (modulo di confemra) -->

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Richiesta inviata – SaSida Country</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- STYLEE -->
<style>
  :root {
    --cream: #f5f0e8;
    --warm-white: #faf7f2;
    --olive: #6b7a4a;
    --olive-dark: #4a5635;
    --olive-light: #9aaa6e;
    --gold: #c4a664;
    --gold-light: #d4bc85;
    --dark: #1e1e1a;
    --text: #2d2d28;
    --text-light: #6b6b5e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Barlow', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* SFONDO */
  .page-bg {
    position: fixed;
    inset: 0;
    background:
      linear-gradient(to bottom, rgba(20,20,16,0.72) 0%, rgba(20,20,16,0.55) 50%, rgba(20,20,16,0.82) 100%),
      url('img/sfondo.jpg') center/cover no-repeat;
    filter: blur(3px);
    z-index: 0;
  }

  /* PARTICELLE decorative */
  .particles {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: var(--gold-light);
    border-radius: 50%;
    opacity: 0;
    animation: floatUp var(--dur) ease-in forwards;
    animation-delay: var(--delay);
  }
  @keyframes floatUp {
    0%   { opacity: 0; transform: translateY(0) scale(1); }
    20%  { opacity: 0.7; }
    80%  { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(-120px) scale(0.4); }
  }

  /* CARD centrale */
  .card {
    position: relative;
    z-index: 10;
    text-align: center;
    max-width: 560px;
    width: calc(100% - 3rem);
    padding: 4rem 3.5rem;
    border-radius: 2rem;
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(28px) saturate(160%);
    -webkit-backdrop-filter: blur(28px) saturate(160%);
    box-shadow:
      0 8px 48px rgba(0,0,0,0.35),
      inset 0 1px 1px rgba(255,255,255,0.18),
      inset 0 -1px 1px rgba(255,255,255,0.04);
    opacity: 0;
    transform: translateY(28px);
    animation: cardIn 1s cubic-bezier(0.22, 1, 0.36, 1) forwards 0.2s;
  }
  .card::before {
    content: "";
    position: absolute; inset: 0;
    border-radius: 2rem;
    padding: 1px;
    background: linear-gradient(160deg,
      rgba(212,188,133,0.55) 0%,
      rgba(255,255,255,0.08) 40%,
      rgba(255,255,255,0) 60%,
      rgba(212,188,133,0.2) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }
  @keyframes cardIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ICONA check animata */
  .check-wrap {
    width: 72px;
    height: 72px;
    margin: 0 auto 2rem;
    position: relative;
  }
  .check-circle {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    position: absolute;
    inset: 0;
    opacity: 0;
    transform: scale(0.6);
    animation: circleIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards 0.7s;
  }
  @keyframes circleIn {
    to { opacity: 1; transform: scale(1); }
  }
  .check-svg {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .check-svg svg {
    opacity: 0;
    animation: checkIn 0.4s ease forwards 1.1s;
  }
  @keyframes checkIn {
    to { opacity: 1; }
  }
  .check-svg svg polyline {
    stroke-dasharray: 30;
    stroke-dashoffset: 30;
    animation: drawCheck 0.45s ease forwards 1.15s;
  }
  @keyframes drawCheck {
    to { stroke-dashoffset: 0; }
  }

  /* DECO LINE */
  .deco-line {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 0 auto 2rem;
    max-width: 160px;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 1.4s;
  }
  .deco-line::before, .deco-line::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--gold);
    opacity: 0.4;
  }
  .deco-dot {
    width: 4px;
    height: 4px;
    background: var(--gold);
    transform: rotate(45deg);
    opacity: 0.6;
  }

  /* TESTO */
  .label {
    font-family: 'Barlow', sans-serif;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold-light);
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 1.5s;
  }
  h1 {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(2rem, 5vw, 2.8rem);
    font-weight: 400;
    color: #fff;
    line-height: 1.2;
    letter-spacing: -0.01em;
    margin-bottom: 1.4rem;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 1.6s;
  }
  h1 em {
    font-style: italic;
    color: var(--gold-light);
  }
  .desc {
    font-family: 'Barlow', sans-serif;
    font-size: 0.9rem;
    line-height: 1.9;
    color: rgba(255,255,255,0.62);
    font-weight: 300;
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 1.75s;
  }

  /* DETTAGLI */
  .summary {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(212,188,133,0.15);
    border-radius: 1rem;
    padding: 1.4rem 1.8rem;
    margin-bottom: 2.5rem;
    text-align: left;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 1.9s;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 1rem;
    padding: 0.45rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-label {
    font-family: 'Barlow', sans-serif;
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    white-space: nowrap;
  }
  .summary-value {
    font-family: 'Instrument Serif', serif;
    font-size: 0.95rem;
    color: rgba(255,255,255,0.82);
    text-align: right;
  }

  /* CTA */
  .actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 2.05s;
  }
  .btn-back {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.85rem 2.2rem;
    border-radius: 9999px;
    background: var(--olive);
    color: #fff;
    font-family: 'Barlow', sans-serif;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-decoration: none;
    transition: background 0.3s, transform 0.3s;
    box-shadow: 0 4px 20px rgba(107,122,74,0.3);
  }
  .btn-back:hover { background: var(--olive-dark); transform: translateY(-2px); }
  .btn-wa {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.85rem 2.2rem;
    border-radius: 9999px;
    background: rgba(196,166,100,0.1);
    color: var(--gold-light);
    font-family: 'Barlow', sans-serif;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-decoration: none;
    transition: background 0.3s, transform 0.3s;
    position: relative;
    overflow: hidden;
  }
  .btn-wa::before {
    content: "";
    position: absolute; inset: 0;
    border-radius: 9999px;
    padding: 1px;
    background: linear-gradient(160deg,
      rgba(212,188,133,0.6) 0%,
      rgba(196,166,100,0.15) 50%,
      rgba(212,188,133,0.3) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
  }
  .btn-wa:hover { background: rgba(196,166,100,0.2); transform: translateY(-2px); }

  /* FOOTER */
  .page-footer {
    position: relative;
    z-index: 10;
    margin-top: 2.5rem;
    font-family: 'Barlow', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 2.2s;
  }

  @keyframes fadeIn { to { opacity: 1; } }

  /* MOBILE */
  @media (max-width: 480px) {
    .card { padding: 2.8rem 1.8rem; }
    .actions { flex-direction: column; align-items: stretch; }
    .btn-back, .btn-wa { justify-content: center; }
    .summary { padding: 1.2rem 1.2rem; }
  }
</style>
</head>
<body>

<div class="page-bg"></div>

<!-- particelle dorate -->
<div class="particles" id="particles"></div>

<div class="card">

  <!-- check animato -->
  <div class="check-wrap">
    <div class="check-circle"></div>
    <div class="check-svg">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
           stroke="var(--gold-light)" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="5 13 9 17 19 7"/>
      </svg>
    </div>
  </div>

  <div class="deco-line"><div class="deco-dot"></div></div>

  <div class="label">Richiesta ricevuta</div>
  <h1>Vi ricontatteremo<br>entro <em>24 ore</em></h1>
  <p class="desc">
    Grazie per aver scelto SaSida Country.<br>
    Il vostro sogno è già nei nostri pensieri.
  </p>

  <!-- riepilogo dati compilati -->
  <div class="summary" id="summary">
    <div class="summary-row">
      <span class="summary-label">Nome</span>
      <span class="summary-value" id="s-nome">—</span>
    </div>
    <div class="summary-row">
      <span class="summary-label">Contatto</span>
      <span class="summary-value" id="s-tel">—</span>
    </div>
    <div class="summary-row">
      <span class="summary-label">Data</span>
      <span class="summary-value" id="s-data">—</span>
    </div>
    <div class="summary-row">
      <span class="summary-label">Ospiti</span>
      <span class="summary-value" id="s-ospiti">—</span>
    </div>
  </div>

  <div class="actions">
    <a href="index.html" class="btn-back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Torna al sito
    </a>
    <a href="https://wa.me/39XXXXXXXXXX" target="_blank" class="btn-wa">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Scrivici su WhatsApp
    </a>
  </div>

</div>

<div class="page-footer">© 2025 SaSida Country</div>

<!-- SCRIPT -->
<script>
  // Recupera i dati passati via sessionStorage
  const data = JSON.parse(sessionStorage.getItem('sasida_form') || '{}');

  if (data.nome)   document.getElementById('s-nome').textContent   = data.nome;
  if (data.tel)    document.getElementById('s-tel').textContent    = data.tel;
  if (data.ospiti) document.getElementById('s-ospiti').textContent = data.ospiti + ' persone';
  if (data.data) {
    const d = new Date(data.data);
    const opts = { day: 'numeric', month: 'long', year: 'numeric' };
    document.getElementById('s-data').textContent = d.toLocaleDateString('it-IT', opts);
  }

  // Genera particelle dorate
  const container = document.getElementById('particles');
  for (let i = 0; i < 28; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      bottom: ${Math.random() * 30}%;
      --dur: ${1.8 + Math.random() * 2.4}s;
      --delay: ${0.5 + Math.random() * 3}s;
      width: ${1 + Math.random() * 2.5}px;
      height: ${1 + Math.random() * 2.5}px;
    `;
    container.appendChild(p);
  }
</script>
</body>
</html>
