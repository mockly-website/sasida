<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Richiesta ricevuta – SaSida Country</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --warm-white: #faf7f2;
    --olive: #6b7a4a;
    --olive-dark: #4a5635;
    --olive-light: #9aaa6e;
    --gold: #c4a664;
    --gold-light: #d4bc85;
    --dark: #1e1e1a;
    --text: #2d2d28;
    --text-light: #6b6b5e;
    --font-serif: 'Instrument Serif', serif;
    --font-sans: 'Barlow', sans-serif;
    --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-sans);
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }

  .page-bg {
    position: fixed; inset: -10px;
    background: linear-gradient(to bottom, rgba(10,10,8,0.78) 0%, rgba(10,10,8,0.5) 50%, rgba(10,10,8,0.85) 100%),
                url('img/sfondo.jpg') center/cover no-repeat;
    filter: blur(5px) saturate(1.05);
    z-index: 0;
  }

  .particles {
    position: fixed; inset: 0;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: var(--gold-light);
    border-radius: 50%;
    opacity: 0;
    animation: floatUp var(--dur) ease-in forwards;
    animation-delay: var(--delay);
  }
  @keyframes floatUp {
    0%   { opacity: 0; transform: translateY(0) scale(1); }
    20%  { opacity: 0.6; }
    80%  { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(-140px) scale(0.3); }
  }

  .card {
    position: relative;
    z-index: 10;
    text-align: center;
    max-width: 520px;
    width: calc(100% - 3rem);
    padding: 3.5rem 3rem;
    border-radius: 2rem;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(30px) saturate(160%);
    -webkit-backdrop-filter: blur(30px) saturate(160%);
    box-shadow: 0 8px 60px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
    opacity: 0;
    transform: translateY(30px);
    animation: cardIn 1s var(--ease-out) forwards 0.2s;
  }
  .card::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 2rem;
    padding: 1px;
    background: linear-gradient(160deg,
      rgba(212,188,133,0.4) 0%,
      rgba(255,255,255,0.06) 40%,
      transparent 60%,
      rgba(212,188,133,0.15) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }
  @keyframes cardIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .check-wrap {
    width: 64px;
    height: 64px;
    margin: 0 auto 1.8rem;
    position: relative;
  }
  .check-circle {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    position: absolute; inset: 0;
    opacity: 0;
    transform: scale(0.6);
    animation: circleIn 0.6s var(--ease-out) forwards 0.7s;
  }
  @keyframes circleIn { to { opacity: 1; transform: scale(1); } }

  .check-svg {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .check-svg svg { opacity: 0; animation: fadeIn 0.4s ease forwards 1.1s; }
  .check-svg svg polyline {
    stroke-dasharray: 30;
    stroke-dashoffset: 30;
    animation: drawCheck 0.45s ease forwards 1.15s;
  }
  @keyframes drawCheck { to { stroke-dashoffset: 0; } }

  .deco-line {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 0 auto 1.8rem;
    max-width: 120px;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 1.4s;
  }
  .deco-line::before, .deco-line::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--gold);
    opacity: 0.3;
  }
  .deco-dot {
    width: 4px;
    height: 4px;
    background: var(--gold);
    transform: rotate(45deg);
    opacity: 0.5;
  }

  .label {
    font-family: var(--font-sans);
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold-light);
    margin-bottom: 0.8rem;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 1.5s;
  }
  h1 {
    font-family: var(--font-serif);
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    font-weight: 400;
    color: #fff;
    line-height: 1.25;
    letter-spacing: -0.01em;
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 1.6s;
  }
  h1 em { font-style: italic; color: var(--gold-light); }
  .desc {
    font-family: var(--font-sans);
    font-size: 0.85rem;
    line-height: 1.9;
    color: rgba(255,255,255,0.5);
    font-weight: 300;
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 1.7s;
  }

  .summary {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(212,188,133,0.1);
    border-radius: 1rem;
    padding: 1.2rem 1.5rem;
    margin-bottom: 2rem;
    text-align: left;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 1.9s;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 1rem;
    padding: 0.4rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-label {
    font-family: var(--font-sans);
    font-size: 0.58rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    white-space: nowrap;
  }
  .summary-value {
    font-family: var(--font-serif);
    font-size: 0.9rem;
    color: rgba(255,255,255,0.8);
    text-align: right;
  }

  .actions {
    display: flex;
    gap: 0.8rem;
    justify-content: center;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 2s;
  }
  .btn-back {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.8rem 2rem;
    border-radius: 9999px;
    background: var(--olive);
    color: #fff;
    font-family: var(--font-sans);
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-decoration: none;
    transition: all 0.35s var(--ease-out);
    box-shadow: 0 4px 20px rgba(107,122,74,0.25);
  }
  .btn-back:hover { background: var(--olive-dark); transform: translateY(-2px); box-shadow: 0 6px 24px rgba(107,122,74,0.35); }
  .btn-wa {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.8rem 2rem;
    border-radius: 9999px;
    background: rgba(196,166,100,0.08);
    color: var(--gold-light);
    font-family: var(--font-sans);
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-decoration: none;
    transition: all 0.35s var(--ease-out);
    border: 1px solid rgba(212,188,133,0.15);
  }
  .btn-wa:hover { background: rgba(196,166,100,0.15); transform: translateY(-2px); border-color: rgba(212,188,133,0.3); }

  .page-footer {
    position: relative;
    z-index: 10;
    margin-top: 2rem;
    font-family: var(--font-sans);
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.12);
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 2.2s;
  }

  @keyframes fadeIn { to { opacity: 1; } }

  @media (max-width: 480px) {
    .card { padding: 2.5rem 1.5rem; }
    .actions { flex-direction: column; align-items: stretch; }
    .btn-back, .btn-wa { justify-content: center; }
    .summary { padding: 1rem 1rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
    }
    .card { animation: none; opacity: 1; transform: none; }
  }
</style>
</head>
<body>

<div class="page-bg"></div>
<div class="particles" id="particles"></div>

<div class="card">

  <div class="check-wrap">
    <div class="check-circle"></div>
    <div class="check-svg">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none"
           stroke="var(--gold-light)" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="5 13 9 17 19 7"/>
      </svg>
    </div>
  </div>

  <div class="deco-line"><div class="deco-dot"></div></div>

  <div class="label">Richiesta ricevuta</div>
  <h1>Vi ricontatteremo<br>entro <em>24 ore</em></h1>
  <p class="desc">
    Grazie per aver scelto SaSida Country.<br>
    Il vostro sogno è già nei nostri pensieri.
  </p>

  <div class="summary" id="summary">
    <div class="summary-row">
      <span class="summary-label">Nome</span>
      <span class="summary-value" id="s-nome">—</span>
    </div>
    <div class="summary-row">
      <span class="summary-label">Email</span>
      <span class="summary-value" id="s-email">—</span>
    </div>
    <div class="summary-row">
      <span class="summary-label">Contatto</span>
      <span class="summary-value" id="s-tel">—</span>
    </div>
    <div class="summary-row">
      <span class="summary-label">Data</span>
      <span class="summary-value" id="s-data">—</span>
    </div>
    <div class="summary-row">
      <span class="summary-label">Ospiti</span>
      <span class="summary-value" id="s-ospiti">—</span>
    </div>
  </div>

  <div class="actions">
    <a href="index.html" class="btn-back">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Torna al sito
    </a>
    <a href="https://wa.me/39XXXXXXXXXX" target="_blank" rel="noopener" class="btn-wa">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Scrivici su WhatsApp
    </a>
  </div>

</div>

<div class="page-footer">© 2025 SaSida Country</div>

<script>
  const data = JSON.parse(sessionStorage.getItem('sasida_form') || '{}');

  if (data.nome)   document.getElementById('s-nome').textContent   = data.nome;
  if (data.email)  document.getElementById('s-email').textContent  = data.email;
  if (data.tel)    document.getElementById('s-tel').textContent    = data.tel;
  if (data.ospiti) document.getElementById('s-ospiti').textContent = data.ospiti + ' persone';
  if (data.data) {
    const d = new Date(data.data + 'T12:00:00');
    document.getElementById('s-data').textContent = d.toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  const container = document.getElementById('particles');
  for (let i = 0; i < 24; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      bottom: ${Math.random() * 30}%;
      --dur: ${1.8 + Math.random() * 2.4}s;
      --delay: ${0.5 + Math.random() * 3}s;
      width: ${1 + Math.random() * 2.5}px;
      height: ${1 + Math.random() * 2.5}px;
    `;
    container.appendChild(p);
  }
</script>
</body>
</html>
